<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendamento - Benjamin Pet Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --amarelo: #ffc107; --bege: #fffaf5; --escuro: #212529; }
        body { background-color: var(--bege); font-family: 'Segoe UI', sans-serif; }
        
        .form-container { 
            background: #fff; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-top: 30px; 
            margin-bottom: 50px; 
        }
        
        .section-title { 
            border-left: 5px solid var(--amarelo); 
            padding-left: 15px; 
            margin-bottom: 25px; 
            font-weight: bold; 
            color: var(--escuro);
        }

        .btn-finalizar { 
            background-color: var(--amarelo); 
            color: var(--escuro); 
            font-weight: bold; 
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            transition: 0.3s;
        }
        .btn-finalizar:hover { background-color: #e5ad06; transform: scale(1.01); }
        
        footer { background-color: var(--escuro); color: white; padding: 20px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Benjamin <span class="text-warning">Pet Shop</span> 🐾</a>
        <a href="index.html" class="btn btn-outline-warning btn-sm rounded-pill px-3">Voltar ao Início</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9 form-container">
            <h2 class="text-center mb-5 fw-bold">Cadastro e Agendamento</h2>
            
            <form id="formAgendamento">
                
                <h5 class="section-title">1. Informações do Tutor</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nome Completo *</label>
                        <input type="text" class="form-control" placeholder="Ex: Fabianna Silva" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">E-mail *</label>
                        <input type="email" class="form-control" placeholder="nome@exemplo.com" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">CPF *</label>
                        <input type="text" class="form-control" placeholder="000.000.000-00" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Telefone/WhatsApp *</label>
                        <input type="tel" class="form-control" placeholder="(11) 99999-9999" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold d-block">Sexo *</label>
                        <div class="form-check form-check-inline mt-1">
                            <input class="form-check-input" type="radio" name="sexo" id="f" required>
                            <label class="form-check-label" for="f">Feminino</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="sexo" id="m">
                            <label class="form-check-label" for="m">Masculino</label>
                        </div>
                    </div>
                </div>

                <h5 class="section-title">2. Informações do Pet</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Nome do Pet *</label>
                        <input type="text" class="form-control" placeholder="Ex: Benjamin" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Raça *</label>
                        <input type="text" class="form-control" placeholder="Ex: SRD, Golden..." required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Idade *</label>
                        <input type="number" class="form-control" placeholder="Anos" min="0" required>
                    </div>
                </div>

                <h5 class="section-title">3. Escolha do Serviço e Data</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Serviço *</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Selecione o serviço...</option>
                            <option>Banho Relaxante</option>
                            <option>Tosa Especializada</option>
                            <option>Banho + Tosa</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Como o Pet chegará? *</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Selecione o método...</option>
                            <option>Vou levar ao local</option>
                            <option>Tele-busca (Taxi Dog)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Data Desejada *</label>
                        <input type="date" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Horário *</label>
                        <input type="time" class="form-control" required>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="confirma" required>
                    <label class="form-check-label small" for="confirma">
                        Autorizo o Benjamin Pet Shop a realizar os serviços selecionados.
                    </label>
                </div>

                <button type="submit" class="btn btn-finalizar w-100 shadow-sm">FINALIZAR AGENDAMENTO</button>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalSucesso" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-body text-center p-5">
        <div class="mb-3">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
        </div>
        <h3 class="fw-bold">Agendamento Concluído!</h3>
        <p class="text-muted">Olá! Recebemos seu pedido. Em breve entraremos em contato para confirmar os detalhes.</p>
        <button type="button" class="btn btn-dark rounded-pill px-5 mt-3" onclick="window.location.href='index.html'">Voltar para a Home</button>
      </div>
    </div>
  </div>
</div>

<footer class="text-center">
    <div class="container">
        <p class="mb-0 small opacity-50">Benjamin Pet Shop | Projeto Acadêmico Fase 2</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Captura o formulário
    const form = document.getElementById('formAgendamento');
    // Inicializa o Modal do Bootstrap
    const modalSucesso = new bootstrap.Modal(document.getElementById('modalSucesso'));

    form.addEventListener('submit', function(event) {
        // Impede o envio real (que daria tela branca)
        event.preventDefault();

        // Se o formulário estiver preenchido corretamente
        if (form.checkValidity()) {
            // Mostra a mensagem de sucesso na tela
            modalSucesso.show();
            // Opcional: limpa o formulário
            form.reset();
        }
    });
</script>

</body>
</html>
